<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ERP Piladora Don Guillo</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="login-body">
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card login-card shadow">
        <div class="card-body p-4">
          <h3 class="text-center text-success fw-bold mb-2">
            ERP Piladora Don Guillo
          </h3>

          <p class="text-center text-muted mb-4">
            Inicio de sesión
          </p>

          <form id="loginForm">
            <div class="mb-3">
              <label for="usuario" class="form-label">Usuario</label>
              <input
                type="text"
                class="form-control"
                id="usuario"
                placeholder="Ingrese su usuario"
                autocomplete="username"
                required
              />
            </div>

            <div class="mb-3">
              <label for="contrasena" class="form-label">Contraseña</label>
              <input
                type="password"
                class="form-control"
                id="contrasena"
                placeholder="Ingrese su contraseña"
                autocomplete="current-password"
                required
              />

              <div class="form-check mt-2">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="mostrarContrasenaLogin"
                />
                <label class="form-check-label" for="mostrarContrasenaLogin">
                  Mostrar contraseña
                </label>
              </div>
            </div>

            <button type="submit" class="btn btn-success w-100">
              Ingresar
            </button>

            <div
              id="mensajeLogin"
              class="alert alert-danger mt-3 d-none"
              role="alert"
            ></div>
          </form>

          <div class="alert alert-info mt-3 mb-0 small" role="alert">
            El perfil del usuario será identificado automáticamente por el sistema.
          </div>

          <div class="text-center mt-3">
            <a href="index.html" class="text-success">Volver al inicio</a>
          </div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
